{% extends 'base.html' %}
{% load static %}

{% block title %}Server Error{% endblock %}

{% block content %}
<section class="bg-cream text-navy py-24">
    <div class="container mx-auto px-4 md:px-8 text-center">
        <div class="max-w-lg mx-auto">
            <div class="text-8xl font-bold text-red mb-4">500</div>
            <h1 class="text-3xl md:text-4xl font-bold mb-4">Something Went Wrong</h1>
            <p class="text-lg text-gray-700 mb-8">
                An unexpected error occurred. Please try again later.
            </p>
            <a href="{% url 'index' %}"
               class="btn-primary bg-navy hover:bg-opacity-90 text-cream px-6 py-3 rounded-lg font-medium inline-flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Home
            </a>
        </div>
    </div>
</section>
{% endblock %}
